<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Notes App</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: 2px solid #66a6ff;
      font-size: 1em;
      outline: none;
    }
    .password-toggle {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-toggle input {
      flex: 1;
    }
    .password-toggle span {
      position: absolute;
      right: 15px;
      cursor: pointer;
      font-size: 1.2em;
    }
    button {
      padding: 10px 20px;
      font-size: 1em;
      margin: 12px 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .save-btn {
      background-color: #66a6ff;
      color: white;
    }
    .save-btn:hover {
      background-color: #5591dd;
    }
    .delete-btn {
      background-color: #ff6b6b;
      color: white;
      padding: 6px 10px;
      border-radius: 5px;
    }
    .delete-btn:hover {
      background-color: #e25454;
    }
    .note {
      background: #f7f7f7;
      margin-top: 18px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
      position: relative;
      cursor: pointer;
    }
    .note-title {
      font-weight: bold;
      font-size: 1.1em;
    }
    .note-content {
      display: none;
      margin-top: 10px;
      font-size: 1em;
      white-space: pre-wrap;
    }
    .auth {
      margin-bottom: 25px;
    }
    #addNoteForm {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.5s ease;
    }
    #addNoteForm.show {
      max-height: 500px;
      opacity: 1;
    }
    #toggleNoteFormBtn {
      font-size: 1.8em;
      cursor: pointer;
      background: none;
      border: none;
      margin-bottom: 10px;
      color: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="auth" id="authSection">
    <h2>Login to Access Your Notes</h2>
    <input type="email" id="email" placeholder="Email" />
    <div class="password-toggle">
      <input type="password" id="password" placeholder="Password" />
      <span onclick="togglePasswordVisibility()">👁️</span>
    </div>
    <button style="box-shadow: 2px 2px 8px black; color: rgb(0, 0, 0); background-color: chartreuse;" onclick="signUp()">Sign Up</button>
    <button style="box-shadow: 2px 2px 8px black; color: rgb(0, 0, 0); background-color: chartreuse;" onclick="login()">Login</button>
  </div>

  <div id="notesSection" style="display:none">
    <button onclick="logout()" style="background-color:#c62828; color:white; float: right;">Logout</button>
    <h2>Your Notes</h2>
    <button id="toggleNoteFormBtn" onclick="toggleNoteForm()">➕</button>
    <div id="addNoteForm">
      <input type="text" id="noteTitle" placeholder="Note Title" />
      <textarea id="noteContent" rows="6" placeholder="Type your note here..."></textarea>
      <button class="save-btn" onclick="saveNote()">Save Note</button>
    </div>
  </div>
</div>
<div id="notesList"></div>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyBj72SFCM2wSHEP5IEqOCFNMP_FiL0gw28",
    authDomain: "test-489a1.firebaseapp.com",
    databaseURL: "https://test-489a1-default-rtdb.firebaseio.com/",
    projectId: "test-489a1",
    storageBucket: "test-489a1.appspot.com",
    messagingSenderId: "978892656529",
    appId: "1:978892656529:web:ea00af8b6e3768abba1430"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("authSection").style.display = "none";
      document.getElementById("notesSection").style.display = "block";
      loadNotes(user.uid);
    } else {
      document.getElementById("authSection").style.display = "block";
      document.getElementById("notesSection").style.display = "none";
    }
  });

  function signUp() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    auth.createUserWithEmailAndPassword(email, password)
      .catch(err => alert("Error: " + err.message));
  }

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(email, password)
      .catch(err => alert("Login failed: " + err.message));
  }

  function logout() {
    auth.signOut();
  }

  function saveNote() {
    const user = auth.currentUser;
    if (!user) return;
    const title = document.getElementById("noteTitle").value.trim();
    const content = document.getElementById("noteContent").value.trim();
    if (!title || !content) return alert("Please enter both title and content.");
    const ref = db.ref("users/" + user.uid + "/notes").push();
    ref.set({ title, content });
    document.getElementById("noteTitle").value = "";
    document.getElementById("noteContent").value = "";
  }

  function loadNotes(uid) {
    const list = document.getElementById("notesList");
    list.innerHTML = "";
    db.ref("users/" + uid + "/notes").on("value", snapshot => {
      list.innerHTML = "";
      snapshot.forEach(child => {
        const note = child.val();
        const div = document.createElement("div");
        div.className = "note";
        div.innerHTML = `
          <div class="note-title">${note.title}</div>
          <div class="note-content">${note.content}</div>
          <button class="delete-btn" onclick="deleteNote('${uid}', '${child.key}')">Delete</button>
        `;
        div.onclick = function(e) {
          if (!e.target.classList.contains('delete-btn')) {
            const contentDiv = this.querySelector(".note-content");
            contentDiv.style.display = contentDiv.style.display === "none" ? "block" : "none";
          }
        };
        list.appendChild(div);
      });
    });
  }

  function deleteNote(uid, key) {
    if (confirm("Are you sure you want to delete this note?")) {
      db.ref("users/" + uid + "/notes/" + key).remove();
    }
  }

  function togglePasswordVisibility() {
    const passInput = document.getElementById("password");
    passInput.type = passInput.type === "password" ? "text" : "password";
  }

  function toggleNoteForm() {
    const form = document.getElementById("addNoteForm");
    const btn = document.getElementById("toggleNoteFormBtn");
    form.classList.toggle("show");
    btn.textContent = form.classList.contains("show") ? "➖" : "➕";
  }
</script>

</body>
</html>
